name: bindings-check

# Detects tauri-specta drift: if `src/lib/shared/ipc/bindings.ts` does not
# match what the current Rust commands would generate, the PR is blocked.
# Fix: run `pnpm tauri dev` once locally and commit the regenerated file.

on:
  pull_request:
    paths:
      - "src-tauri/**"
      - "src/lib/shared/ipc/bindings.ts"
      - ".github/workflows/bindings-check.yml"
      - "package.json"
  push:
    branches: [main]

jobs:
  check:
    name: tauri-specta bindings up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev javascriptcoregtk-4.1

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build (debug, no bundle) to regenerate bindings.ts
        # tauri-specta writes bindings.ts during the debug build (see
        # src-tauri/src/lib.rs). We don't need a bundle — `--no-bundle`
        # keeps CI fast.
        run: pnpm tauri build --debug --no-bundle

      - name: Fail if bindings.ts is stale
        run: |
          if ! git diff --exit-code src/lib/shared/ipc/bindings.ts; then
            echo ""
            echo "::error::tauri-specta bindings are stale."
            echo "Fix locally with: pnpm tauri dev (then commit src/lib/shared/ipc/bindings.ts)"
            exit 1
          fi
