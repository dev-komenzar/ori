name: build-skills stale check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  stale-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm build:skills
      - name: Fail if bundled scripts are stale
        run: git diff --exit-code .apm/skills/*/scripts/
